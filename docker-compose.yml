version: '3.8'

services:
  # Database
  db:
    image: postgres:16-alpine
    container_name: logtudo-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-site_logtudo_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Application (Backend + Frontend)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: logtudo-site
    restart: always
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-site_logtudo_db}
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "3000"
    labels:
      - traefik.enable=true
      - traefik.http.routers.logtudo-app.rule=Host(`e4844gw8gocco0c0cwk0kckw.72.61.25.133.sslip.io`)
      - traefik.http.routers.logtudo-app.entrypoints=http,https
      - traefik.http.services.logtudo-app.loadbalancer.server.port=3000
      - coolify.managed=true
      - coolify.proxy=true
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/content || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
