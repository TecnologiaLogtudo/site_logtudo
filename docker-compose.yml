version: '3.8'

services:
  # Database
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-site_logtudo_dev-db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-site_logtudo_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Application (Backend + Frontend)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-site_logtudo_dev-db}
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "3000"
    labels:
      - traefik.enable=true
      - traefik.http.middlewares.force-https.redirectscheme.scheme=https
      - traefik.http.routers.logtudo-dev-app-http.rule=Host(`s8oswow8wcgsosc040w8swsk.72.61.25.133.sslip.io`)
      - traefik.http.routers.logtudo-dev-app-http.entrypoints=http
      - traefik.http.routers.logtudo-dev-app-http.middlewares=force-https
      - traefik.http.routers.logtudo-dev-app.rule=Host(`s8oswow8wcgsosc040w8swsk.72.61.25.133.sslip.io`)
      - traefik.http.routers.logtudo-dev-app.entrypoints=https
      - traefik.http.routers.logtudo-dev-app.tls=true
      - traefik.http.services.logtudo-dev-app.loadbalancer.server.port=3000
      - coolify.managed=true
      - coolify.proxy=true
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/content || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
