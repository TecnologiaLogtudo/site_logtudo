version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: logtudo-app
    restart: always
    expose:
      - '3000'
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-logtudo}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - 'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:3000/health'')" || exit 1'
      interval: 30s
      timeout: 10s
      retries: 3

  db:
    image: postgres:15-alpine
    container_name: logtudo-db
    restart: always
    environment:
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
      - POSTGRES_DB=${DB_NAME:-logtudo}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-logtudo}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
