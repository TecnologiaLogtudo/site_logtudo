version: '3.8'

services:
  frontend:
    build: .
    restart: always
    ports:
      - "8080:80"
    environment:
      - VITE_API_URL=http://localhost:3000
    networks:
      - web
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/logtudo
    networks:
      - web
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=logtudo
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - web

# A correção principal está aqui: definindo a rede 'web'
networks:
  web:
    driver: bridge

volumes:
  postgres_data: